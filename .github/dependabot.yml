version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 5
    groups:
      next-runtime:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      linting:
        dependency-type: "development"
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "@next/eslint-plugin-next"
      tooling:
        dependency-type: "development"
        patterns:
          - "typescript"
          - "@types/*"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "Europe/Zurich"
    groups:
      github-actions:
        patterns:
          - "*"
